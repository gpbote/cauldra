name: cauldra
description: "A fantasy time-management game."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flame: ^1.30.1
  flame_tiled: ^3.0.4
  flame_audio: ^2.11.5

  provider: ^6.1.5
  shared_preferences: ^2.5.5
  google_fonts: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/music/
    - assets/audio/sfx/
    - assets/fonts/
    - assets/animations/
    - assets/maps/
    - assets/tiles/
    - assets/sprites/